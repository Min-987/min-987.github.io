<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Focus — 液態番茄鐘</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100vh; height:100dvh; overflow:hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a14;
    color:#fff;
    transition: background-color 0.5s ease;
  }
  body { position:relative; }

  /* 滿版液態背景 */
  .liquid-stage {
    position:fixed; inset:0; width:100%; height:100%;
  }
  svg.liquid { position:absolute; bottom:0; left:0; width:100%; height:100%; }

  /* 玻璃感光暈，模擬容器邊緣反光 */
  .vignette {
    position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.08), transparent 50%),
                radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.35) 100%);
    z-index:5;
  }

  .bubble {
    position:absolute; bottom:0; border-radius:50%;
    background: rgba(255,255,255,0.4);
    animation: rise linear infinite;
    z-index:3;
    cursor: pointer;
    touch-action: none;
  }
  @keyframes rise {
    0% { transform: translateY(0) translateX(0) scale(1); opacity:0.7; }
    100% { transform: translateY(-100dvh) translateX(var(--drift,0px)) scale(0.4); opacity:0; }
  }

  /* 氣泡點擊爆裂粒子 */
  .pop-particle {
    position: fixed; border-radius: 50%; background: rgba(255, 255, 255, 0.75);
    pointer-events: none; z-index: 98;
    animation: particlePop 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  }
  @keyframes particlePop {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* 中央內容層 */
  .hud {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; pointer-events:none;
  }
  .hud > * { pointer-events:auto; }

  .mode-tabs { display:flex; gap:8px; position:fixed; top:32px; left:50%; transform:translateX(-50%); }
  .mode-tabs span {
    font-size:11px; padding:7px 16px; border-radius:999px; cursor:pointer;
    color:rgba(255,255,255,0.55); letter-spacing:1.5px; transition: all 0.25s;
    border:1px solid rgba(255,255,255,0.12); backdrop-filter: blur(8px);
  }
  .mode-tabs span.active { background:rgba(255,255,255,0.14); color:#fff; border-color:rgba(255,255,255,0.3); }

  .phase-label {
    font-size:13px; letter-spacing:5px; text-transform:uppercase;
    color:rgba(255,255,255,0.65); text-shadow:0 2px 12px rgba(0,0,0,0.5);
  }
  .time-display {
    font-size:clamp(56px, 14vw, 120px); font-weight:200; letter-spacing:4px;
    text-shadow: 0 4px 40px rgba(0,0,0,0.5);
    font-variant-numeric: tabular-nums;
    line-height:1;
  }

  .controls { display:flex; gap:16px; margin-top:8px; }

  .loop-row {
    display:flex; align-items:center; gap:16px; margin-top:14px;
    font-size:12px; color:rgba(255,255,255,0.6); letter-spacing:1px;
  }
  .loop-toggle { display:flex; align-items:center; gap:7px; cursor:pointer; }
  .loop-toggle input { width:15px; height:15px; accent-color:#fff; cursor:pointer; }
  .tomato-count { letter-spacing:1px; }
  button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color:#fff; padding:14px 32px; border-radius:999px;
    font-size:14px; cursor:pointer; backdrop-filter: blur(14px);
    transition: all 0.25s ease; letter-spacing:1.5px;
  }
  button:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
  button.primary {
    background: rgba(255,255,255,0.95); color:#1a1a2e; border:none;
    box-shadow:0 8px 30px rgba(255,255,255,0.25); font-weight:500;
  }
  button.primary:hover { box-shadow:0 10px 36px rgba(255,255,255,0.35); }

  .hint {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:1.5px; z-index:10;
  }

  /* 自訂時間輸入 */
  .custom-time {
    display:none; position:fixed; top:72px; left:50%; transform:translateX(-50%);
    align-items:center; gap:8px; z-index:11;
    background:rgba(20,20,32,0.85); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15); border-radius:999px; padding:7px 8px 7px 16px;
  }
  .custom-time.show { display:flex; }
  .custom-time input {
    width:60px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);
    color:#fff; border-radius:8px; padding:6px 8px; font-size:14px; text-align:center;
  }
  .custom-time span { font-size:12px; color:rgba(255,255,255,0.6); }
  .custom-time button {
    padding:7px 16px; font-size:12px; letter-spacing:1px;
    background:rgba(255,255,255,0.92); color:#1a1a2e; border:none; border-radius:999px; cursor:pointer;
  }

  .percent-tag {
    position:fixed; top:32px; right:82px; z-index:10;
    font-size:13px; color:rgba(255,255,255,0.55); letter-spacing:1px;
    border:1px solid rgba(255,255,255,0.12); padding:7px 14px; border-radius:999px;
    backdrop-filter: blur(8px);
    pointer-events: none;
  }

  /* 浮動側欄按鈕 */
  .floating-btn {
    position:fixed; top:32px; z-index:10;
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); cursor:pointer; transition: all 0.25s;
  }
  .floating-btn:hover { background:rgba(255,255,255,0.14); transform: scale(1.05); }
  .floating-btn svg { width:16px; height:16px; stroke: white; }

  /* 側欄面板 Drawers */
  .drawer {
    position: fixed; top: 0; height: 100vh; height: 100dvh; width: 320px; max-width: 85%;
    background: rgba(10, 10, 20, 0.72); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08); z-index: 100;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    padding: 24px; color: #fff; box-shadow: 0 10px 50px rgba(0,0,0,0.5);
  }
  .left-drawer { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(255,255,255,0.08); }
  .right-drawer { right: 0; transform: translateX(100%); border-left: 1px solid rgba(255,255,255,0.08); }
  .drawer.open { transform: translateX(0); }

  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none;
    z-index: 99; transition: opacity 0.3s ease;
  }
  .drawer-overlay.active { opacity: 1; pointer-events: auto; }

  .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .drawer-header h2 { font-size: 16px; font-weight: 500; letter-spacing: 1px; }
  .drawer-close { font-size: 26px; cursor: pointer; color: rgba(255,255,255,0.5); transition: color 0.2s; }
  .drawer-close:hover { color: #fff; }

  .drawer-content { overflow-y: auto; height: calc(100% - 40px); padding-right: 4px; }
  .drawer-content::-webkit-scrollbar { width: 4px; }
  .drawer-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 99px; }

  .setting-group {
    border-bottom: 1px solid rgba(255,255,255,0.08); padding: 18px 0;
  }
  .setting-group:last-child { border-bottom: none; }
  .setting-title { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; display: block; }
  
  .setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; }
  .setting-label-small { font-size: 12px; color: rgba(255,255,255,0.5); }

  /* 主題網格 */
  .theme-grid { display: flex; gap: 12px; justify-content: flex-start; }
  .theme-opt {
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.25);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
  }
  .theme-opt:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.6); }
  .theme-opt.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.4); transform: scale(1.1); }

  /* 開關開關切換 */
  .switch { position: relative; display: inline-block; width: 42px; height: 22px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0; background-color: rgba(255,255,255,0.15);
    border-radius: 99px; transition: .3s;
  }
  .slider:before {
    position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
    background-color: white; border-radius: 50%; transition: .3s;
  }
  input:checked + .slider { background-color: var(--accent, #5B4FFF); }
  input:checked + .slider:before { transform: translateX(20px); }

  /* 背景音網格 */
  .ambient-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .ambient-opt-item {
    font-size: 10.5px; padding: 7px 0; border-radius: 6px; cursor: pointer; text-align: center;
    color: rgba(255,255,255,0.55); transition: all 0.2s; border: 1px solid rgba(255,255,255,0.12);
  }
  .ambient-opt-item:hover { color: #fff; background: rgba(255,255,255,0.06); }
  .ambient-opt-item.active { background: rgba(255,255,255,0.14); color: #fff; border-color: rgba(255,255,255,0.3); }

  .ambient-vol-input {
    -webkit-appearance: none; appearance: none; width: 100px; height: 4px;
    border-radius: 999px; background: rgba(255,255,255,0.18); cursor: pointer; outline: none;
  }
  .ambient-vol-input::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff;
  }
  .ambient-vol-input::-moz-range-thumb {
    width: 12px; height: 12px; border: none; border-radius: 50%; background: #fff;
  }

  .action-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff;
    padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 12px;
    letter-spacing: 1px;
  }
  .action-btn:hover { background: rgba(255,255,255,0.18); }

  /* 待辦事項清單樣式 */
  .todo-input-row { display: flex; gap: 8px; }
  .todo-input-row input {
    flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 10px 14px; color: #fff; font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .todo-input-row input:focus { border-color: var(--accent, #5B4FFF); }
  .todo-input-row button {
    background: #fff; border: none; border-radius: 10px; width: 36px; height: 36px;
    cursor: pointer; transition: transform 0.2s;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .todo-input-row button:hover { transform: scale(1.05); }
  .todo-input-row button::before, .todo-input-row button::after {
    content: ''; position: absolute; background: #1a1a2e;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    border-radius: 99px;
  }
  .todo-input-row button::before { width: 12px; height: 2px; }
  .todo-input-row button::after { width: 2px; height: 12px; }

  .todo-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; position: relative; }
  .todo-item {
    display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08); padding: 10px 12px; border-radius: 10px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  
  /* 氣泡溶解漂浮動畫 */
  .todo-item.dissolving {
    pointer-events: none; border-radius: 50% !important; width: 44px !important; height: 44px !important; padding: 0 !important;
    justify-content: center; background: rgba(255, 255, 255, 0.2) !important; border-color: rgba(255,255,255,0.4) !important;
    color: transparent !important; text-shadow: none !important; box-shadow: 0 0 12px rgba(255,255,255,0.4);
    animation: dissolveAndFloat 2.0s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    position: absolute; left: 50%; transform: translateX(-50%);
  }
  .todo-item.dissolving * { display: none !important; }
  
  @keyframes dissolveAndFloat {
    0% { bottom: var(--start-bottom, 50px); opacity: 0.8; transform: translateX(-50%) scale(1); }
    30% { border-radius: 50%; width: 36px; height: 36px; transform: translateX(calc(-50% + var(--drift-x, 0px))) scale(1.1); }
    100% { bottom: 100dvh; opacity: 0; transform: translateX(calc(-50% + var(--drift-x-end, 0px) * 2)) scale(0.4); }
  }

  .todo-checkbox {
    width: 17px; height: 17px; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .todo-checkbox:hover { border-color: #fff; }
  .todo-checkbox.checked { background: #fff; border-color: #fff; }
  .todo-checkbox.checked:after {
    content: "✓"; color: #1a1a2e; font-size: 11px; font-weight: bold;
  }
  .todo-text { flex: 1; font-size: 13px; color: rgba(255,255,255,0.85); transition: color 0.2s; word-break: break-all; }
  .todo-text.checked { text-decoration: line-through; color: rgba(255,255,255,0.35); }

  .todo-delete {
    color: rgba(255,255,255,0.3); cursor: pointer; transition: color 0.2s; font-size: 15px; padding: 2px;
  }
  .todo-delete:hover { color: #ff6b6b; }

  /* ===== 手機版響應式 ===== */
  @media (max-width: 600px) {
    .mode-tabs {
      top: max(20px, env(safe-area-inset-top));
      gap:6px;
    }
    .mode-tabs span {
      font-size:10px; padding:6px 12px; letter-spacing:1px;
    }
    .percent-tag {
      top: max(20px, env(safe-area-inset-top));
      right:16px; font-size:11px; padding:6px 11px;
    }
    .floating-btn {
      top: max(20px, env(safe-area-inset-top));
    }
    .hud { gap:12px; }
    .phase-label { font-size:11px; letter-spacing:3px; }
    .time-display { font-size:clamp(44px, 16vw, 72px); letter-spacing:2px; }
    .controls { gap:12px; flex-direction:column; width:78%; max-width:280px; }
    button {
      padding:15px 0; font-size:14px; width:100%; text-align:center;
    }
    .hint {
      bottom: max(20px, env(safe-area-inset-bottom));
      font-size:10px; padding:0 24px; text-align:center;
    }
  }

  @media (max-height: 480px) {
    .hud { gap:8px; }
    .time-display { font-size:clamp(36px, 10vh, 64px); }
    .controls { flex-direction:row; }
    button { padding:10px 24px; }
    .hint { display:none; }
  }

  @media (min-width: 1400px) {
    .time-display { font-size:96px; }
    .controls { gap:20px; }
    button { padding:16px 36px; font-size:15px; }
  }
</style>
</head>
<body>

<div class="liquid-stage">
  <svg class="liquid" id="liquidSvg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
    <defs>
      <linearGradient id="liquidGradient" x1="0" y1="0" x2="0" y2="1">
        <stop id="stop1" offset="0%" stop-color="#5B4FFF"/>
        <stop id="stop2" offset="50%" stop-color="#B14FFF"/>
        <stop id="stop3" offset="100%" stop-color="#FF4FB8"/>
      </linearGradient>
    </defs>
    <path id="wavePath" fill="url(#liquidGradient)" d=""></path>
  </svg>
  <div id="bubbleLayer"></div>
</div>
<div class="vignette"></div>

<!-- 頂部浮動數據 -->
<div class="percent-tag" id="percentTag">0%</div>

<!-- 浮動按鈕 -->
<div class="floating-btn" id="settingsBtn" title="開啟設定" style="left:32px;">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"></circle>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
  </svg>
</div>

<div class="floating-btn" id="todoBtn" title="待辦清單" style="right:32px;">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 11 12 14 22 4"></polyline>
    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
  </svg>
</div>

<!-- 模式切換 -->
<div class="mode-tabs">
  <span class="active" data-min="25">專注 25</span>
  <span data-min="5">短休 5</span>
  <span data-min="15">長休 15</span>
  <span data-min="custom" id="customTab">自訂</span>
</div>

<!-- 自訂時間輸入 -->
<div class="custom-time" id="customTime">
  <input type="number" id="customInput" min="1" max="180" value="25" />
  <span>分鐘</span>
  <button id="customApply">設定</button>
</div>

<!-- 中央核心面板 -->
<div class="hud">
  <div class="phase-label" id="phaseLabel">專注時間</div>
  <div class="time-display" id="timeDisplay">25:00</div>
  <div class="controls">
    <button id="resetBtn">重置</button>
    <button id="startBtn" class="primary">開始專注</button>
  </div>
  <div class="loop-row">
    <label class="loop-toggle">
      <input type="checkbox" id="autoLoop" />
      <span>自動循環</span>
    </label>
    <span class="tomato-count" id="tomatoCount">🍅 × 0</span>
  </div>
</div>

<!-- 側欄：設定 Left Drawer -->
<div class="drawer left-drawer" id="settingsDrawer">
  <div class="drawer-header">
    <h2>設定 Settings</h2>
    <span class="drawer-close" id="settingsClose">&times;</span>
  </div>
  <div class="drawer-content">
    
    <!-- 視覺配色 -->
    <div class="setting-group">
      <label class="setting-title">主題配色 Themes</label>
      <div class="theme-grid">
        <span class="theme-opt active" data-theme="default" title="預設 Aurora" style="background: linear-gradient(135deg, #5B4FFF, #FF4FB8);"></span>
        <span class="theme-opt" data-theme="ocean" title="深海 Ocean" style="background: linear-gradient(135deg, #005c8a, #07dac0);"></span>
        <span class="theme-opt" data-theme="forest" title="森林 Forest" style="background: linear-gradient(135deg, #1b4d3e, #66bb6a);"></span>
        <span class="theme-opt" data-theme="volcano" title="烈焰 Volcano" style="background: linear-gradient(135deg, #800808, #ff5722);"></span>
      </div>
    </div>

    <!-- 音效設定 -->
    <div class="setting-group">
      <div class="setting-row">
        <span>系統音效 Ambient Sounds</span>
        <label class="switch">
          <input type="checkbox" id="soundToggleCheck" checked />
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row" style="margin-top:12px;">
        <span>戳氣泡音效 Pop SFX</span>
        <label class="switch">
          <input type="checkbox" id="bubbleSoundCheck" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- 背景噪音 -->
    <div class="setting-group">
      <label class="setting-title">背景氛圍音 Ambient Noises</label>
      <div class="ambient-grid">
        <span class="ambient-opt-item active" data-noise="off">關閉</span>
        <span class="ambient-opt-item" data-noise="white">白噪音</span>
        <span class="ambient-opt-item" data-noise="pink">粉紅噪</span>
        <span class="ambient-opt-item" data-noise="brown">棕噪音</span>
        <span class="ambient-opt-item" data-noise="rain">即時雨聲</span>
        <span class="ambient-opt-item" data-noise="ocean">即時海浪</span>
        <span class="ambient-opt-item" data-noise="binaural">雙耳節拍</span>
      </div>
      <div class="setting-row" style="margin-top:14px;">

<script>
let totalSeconds = 25*60;
let remaining = totalSeconds;
let timerId = null;
let running = false;
let waveOffset = 0;
let slowDrift = 0;
let soundOn = true;

// ===== 主題配色預設集 =====
const THEMES = {
  default: {
    start: ['#5B4FFF', '#B14FFF', '#FF4FB8'],
    end: ['#FF6B4F', '#FFB14F', '#FFE14F'],
    accent: '#5B4FFF',
    bg: '#0a0a14'
  },
  ocean: {
    start: ['#005c8a', '#007b99', '#07dac0'],
    end: ['#00a8cc', '#00c9c8', '#a1eafb'],
    accent: '#07dac0',
    bg: '#05131a'
  },
  forest: {
    start: ['#1b4d3e', '#297a5b', '#66bb6a'],
    end: ['#388e3c', '#81c784', '#a8ff78'],
    accent: '#66bb6a',
    bg: '#08140e'
  },
  volcano: {
    start: ['#800808', '#b71c1c', '#ff5722'],
    end: ['#d32f2f', '#ff8a65', '#f5af19'],
    accent: '#ff5722',
    bg: '#140606'
  }
};
let currentTheme = 'default';

// ===== 音效系統：Web Audio API 即時合成，含柔和殘響 =====
let audioCtx = null, masterGain = null, reverbSend = null;
function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 主輸出：總音量 + 柔和低通，讓整體更溫潤不刺耳
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.9;
    const masterLP = audioCtx.createBiquadFilter();
    masterLP.type = 'lowpass';
    masterLP.frequency.value = 6500;
    masterGain.connect(masterLP).connect(audioCtx.destination);

    // 殘響：用衰減噪音合成脈衝響應，給聲音空間感
    const conv = audioCtx.createConvolver();
    const len = Math.floor(audioCtx.sampleRate * 1.8);
    const ir = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
    for(let ch=0; ch<2; ch++){
      const d = ir.getChannelData(ch);
      for(let i=0;i<len;i++){
        d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.8);
      }
    }
    conv.buffer = ir;
    reverbSend = audioCtx.createGain();
    reverbSend.gain.value = 0.5;
    reverbSend.connect(conv).connect(masterGain);
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

// 柔和音調，帶淡入淡出包絡；wet 控制送進殘響的量
function playTone(freq, duration, startGain, type='sine', delay=0, wet=0.35){
  if(!soundOn) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  const t0 = audioCtx.currentTime + delay;
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.linearRampToValueAtTime(startGain, t0 + 0.06);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain);
  gain.connect(masterGain);                 // 乾聲
  const send = audioCtx.createGain();
  send.gain.value = wet;
  gain.connect(send).connect(reverbSend);   // 濕聲（殘響）
  osc.start(t0);
  osc.stop(t0 + duration + 0.05);
}

// 開始：柔和上行雙音
function playStartSound(){
  playTone(330, 0.5, 0.09, 'sine');
  playTone(440, 0.55, 0.06, 'sine', 0.09);
}

// 暫停：單一下行柔音
function playPauseSound(){
  playTone(294, 0.4, 0.07, 'sine');
}

// 啵啵音效 (戳氣泡專用)
const bubbleSoundCheck = document.getElementById('bubbleSoundCheck');
function playPopSound(){
  if(!soundOn || !bubbleSoundCheck.checked) return;
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  
  // 快速向上滑音，產生水泡「啵」聲
  const startF = 700 + Math.random() * 500;
  osc.frequency.setValueAtTime(startF, t0);
  osc.frequency.exponentialRampToValueAtTime(startF * 1.8, t0 + 0.05);
  
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(0.08, t0 + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
  
  osc.connect(gain).connect(masterGain);
  osc.start(t0);
  osc.stop(t0 + 0.08);
}

// 氣泡音 (隨機浮空泡泡專用)
function playAmbientBubbleSound(){
  if(!soundOn || ambientType === 'off' || Math.random() > 0.28) return;
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  const f0 = 900 + Math.random()*700;       
  osc.frequency.setValueAtTime(f0, t0);
  osc.frequency.exponentialRampToValueAtTime(f0*0.45, t0+0.12); 
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(0.06, t0+0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0+0.18);
  osc.connect(gain);
  gain.connect(masterGain);
  const send = audioCtx.createGain();
  send.gain.value = 0.6;
  gain.connect(send).connect(reverbSend);
  osc.start(t0);
  osc.stop(t0+0.22);
}

// 完成：溫暖的大三和絃，殘響加重，像缽聲擴散
function playCompleteSound(){
  ensureAudio();
  playTone(392.00, 2.4, 0.12, 'sine', 0.00, 0.8);  // G4
  playTone(493.88, 2.4, 0.09, 'sine', 0.12, 0.8);  // B4
  playTone(587.33, 2.6, 0.07, 'sine', 0.24, 0.8);  // D5
}

// ===== 背景白噪音與自然音效合成器 =====
let ambientType = 'off';
let ambientVolume = 0.6;

// 音訊節點參考
let rainInterval = null;
let rainBgSource = null;
let oceanNoiseSource = null;
let oceanLfo = null;
let binauralOscL = null;
let binauralOscR = null;
let stdNoiseSource = null;

let ambientGain = null; // 背景音專用增益節點

function stopAllAmbient(){
  if(stdNoiseSource){ try { stdNoiseSource.stop() } catch(e){} stdNoiseSource = null; }
  if(rainBgSource){ try { rainBgSource.stop() } catch(e){} rainBgSource = null; }
  if(oceanNoiseSource){ try { oceanNoiseSource.stop() } catch(e){} oceanNoiseSource = null; }
  if(oceanLfo){ try { oceanLfo.stop() } catch(e){} oceanLfo = null; }
  if(binauralOscL){ try { binauralOscL.stop() } catch(e){} binauralOscL = null; }
  if(binauralOscR){ try { binauralOscR.stop() } catch(e){} binauralOscR = null; }
  if(rainInterval){ clearInterval(rainInterval); rainInterval = null; }
}

// 各背景音基本響度平衡系數
function ambientTarget(type){
  const base = type==='white' ? 0.08 
             : type==='pink' ? 0.16 
             : type==='brown' ? 0.30 
             : type==='rain' ? 0.22 
             : type==='ocean' ? 0.35 
             : type==='binaural' ? 0.18 
             : 0;
  return base * ambientVolume;
}

// 生成 4 秒可循環的噪聲 Buffer (單聲道)
function makeNoiseBuffer(type){
  ensureAudio();
  const len = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  if(type === 'white'){
    for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  } else if(type === 'pink'){
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<len;i++){
      const w = Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
    }
  } else { // brown
    let last=0;
    for(let i=0;i<len;i++){
      const w = Math.random()*2-1;
      last = (last + 0.02*w)/1.02; d[i] = last*3.5;
    }
  }
  return buf;
}

function setAmbient(type){
  ambientType = type;
  ensureAudio();
  
  // 1. 停止目前所有播放中的節點
  stopAllAmbient();

  if(type === 'off') return;

  // 2. 初始化背景音專用增益節點（如果尚未建立）
  if(!ambientGain) {
    ambientGain = audioCtx.createGain();
    ambientGain.connect(masterGain);
  }
  
  // 設定目標音量
  ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
  ambientGain.gain.linearRampToValueAtTime(ambientTarget(type), audioCtx.currentTime + 0.6);

  // 3. 根據類型建立合成節點
  if(type === 'white' || type === 'pink' || type === 'brown'){
    // 標準噪聲
    stdNoiseSource = audioCtx.createBufferSource();
    stdNoiseSource.buffer = makeNoiseBuffer(type);
    stdNoiseSource.loop = true;
    stdNoiseSource.connect(ambientGain);
    stdNoiseSource.start();
  } 
  else if(type === 'ocean'){
    // 即時海浪聲：LFO 調變棕噪音
    oceanNoiseSource = audioCtx.createBufferSource();
    oceanNoiseSource.buffer = makeNoiseBuffer('brown');
    oceanNoiseSource.loop = true;

    const waveLfo = audioCtx.createOscillator();
    waveLfo.frequency.value = 0.12; // 約 8 秒一個週期

    const waveLfoGain = audioCtx.createGain();
    waveLfoGain.gain.value = 0.35; // 音量波動深度

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 350; // 基礎濾波器頻率

    const filterLfoGain = audioCtx.createGain();
    filterLfoGain.gain.value = 220; // 濾波截止頻率擺幅

    const vGain = audioCtx.createGain();
    vGain.gain.value = 0.55; // 基礎音量

    // 連結：LFO 影響音量與濾波
    waveLfo.connect(waveLfoGain).connect(vGain.gain);
    waveLfo.connect(filterLfoGain).connect(filter.frequency);
    
    oceanNoiseSource.connect(filter).connect(vGain).connect(ambientGain);
    
    waveLfo.start();
    oceanNoiseSource.start();
    
    oceanLfo = waveLfo;
  }
  else if(type === 'rain'){
    // 即時雨聲：粉噪音背景 + 隨機合成雨點
    rainBgSource = audioCtx.createBufferSource();
    rainBgSource.buffer = makeNoiseBuffer('pink');
    rainBgSource.loop = true;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 700; // 沉悶的背景雨聲
    
    rainBgSource.connect(filter).connect(ambientGain);
    rainBgSource.start();

    // 隨機調度個別雨滴「滴答」聲
    rainInterval = setInterval(() => {
      if (ambientType !== 'rain' || !audioCtx) return;
      const drops = Math.floor(Math.random() * 3) + 1;
      const t0 = audioCtx.currentTime;
      for (let i = 0; i < drops; i++) {
        const delay = Math.random() * 0.12;
        const osc = audioCtx.createOscillator();
        const dGain = audioCtx.createGain();
        const bp = audioCtx.createBiquadFilter();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(1000 + Math.random() * 2200, t0 + delay);
        
        bp.type = 'bandpass';
        bp.frequency.value = 2800;
        bp.Q.value = 4;

        dGain.gain.setValueAtTime(0.0001, t0 + delay);
        dGain.gain.exponentialRampToValueAtTime(0.006 + Math.random()*0.015, t0 + delay + 0.002);
        dGain.gain.exponentialRampToValueAtTime(0.0001, t0 + delay + 0.025);

        osc.connect(bp).connect(dGain).connect(ambientGain);
        osc.start(t0 + delay);
        osc.stop(t0 + delay + 0.035);
      }
    }, 90);
  }
  else if(type === 'binaural'){
    // 雙耳節拍：左耳 200Hz，右耳 210Hz (感知差值 10Hz Alpha 波)
    binauralOscL = audioCtx.createOscillator();
    binauralOscL.type = 'sine';
    binauralOscL.frequency.value = 200;

    binauralOscR = audioCtx.createOscillator();
    binauralOscR.type = 'sine';
    binauralOscR.frequency.value = 210;

    const pannerL = audioCtx.createStereoPanner();
    pannerL.pan.value = -1; // 完全左聲道

    const pannerR = audioCtx.createStereoPanner();
    pannerR.pan.value = 1;  // 完全右聲道

    binauralOscL.connect(pannerL).connect(ambientGain);
    binauralOscR.connect(pannerR).connect(ambientGain);

    binauralOscL.start();
    binauralOscR.start();
  }
}

// ===== 陀螺儀液體傾斜控制 =====
let gyroEnabled = false;
let tiltAngle = 0;
let targetTiltAngle = 0;

const gyroToggle = document.getElementById('gyroToggle');
gyroToggle.addEventListener('change', () => {
  if (gyroToggle.checked) {
    initGyro();
  } else {
    gyroEnabled = false;
    targetTiltAngle = 0;
  }
});

function initGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation);
          gyroEnabled = true;
        } else {
          gyroToggle.checked = false;
          gyroEnabled = false;
        }
      })
      .catch(err => {
        console.error(err);
        gyroToggle.checked = false;
        gyroEnabled = false;
      });
  } else {
    window.addEventListener('deviceorientation', handleOrientation);
    gyroEnabled = true;
  }
}

function handleOrientation(e) {
  if (!gyroToggle.checked) return;
  if (e.gamma !== null) {
    // 限制最大傾斜角度約 45 度 (PI/4)，以 radians 計算
    let rad = (e.gamma / 90) * (Math.PI / 4);
    targetTiltAngle = Math.max(-Math.PI/4, Math.min(Math.PI/4, rad));
  }
}

// 滑鼠移動模擬液體傾斜 (PC 端專用)
  window.addEventListener('mousemove', (e) => {
    if (gyroEnabled && gyroToggle.checked) return; // 陀螺儀啟用時優先使用陀螺儀
    
    // 取得滑鼠在視窗寬度比例 (0 ~ 1)
    const pct = e.clientX / window.innerWidth;
    // 映射到 -60 ~ 60 度擺幅 (約 -1 ~ 1 rad)
    const angle = (pct - 0.5) * (Math.PI / 3);
    targetTiltAngle = angle;
  });

  // 滑鼠移出視窗時水平復原
  window.addEventListener('mouseleave', () => {
    if (gyroEnabled && gyroToggle.checked) return;
    targetTiltAngle = 0;
  });

// ===== 畫中畫 (PiP) 懸浮時鐘 =====
const pipCanvas = document.getElementById('pipCanvas');
const pipCtx = pipCanvas.getContext('2d');
let pipVideo = null;
let pipActive = false;
const pipBtn = document.getElementById('pipBtn');

function updatePiPCanvas() {
  if (!pipActive) return;
  
  const theme = THEMES[currentTheme];
  // 1. 繪製背景
  pipCtx.fillStyle = theme.bg;
  pipCtx.fillRect(0, 0, 300, 300);
  
  const progress = 1 - (remaining/totalSeconds);
  const cx = 150, cy = 150, r = 115;
  
  // 2. 圓形進度條底軌
  pipCtx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
  pipCtx.lineWidth = 12;
  pipCtx.beginPath();
  pipCtx.arc(cx, cy, r, 0, Math.PI * 2);
  pipCtx.stroke();
  
  // 3. 漸層波浪進度
  const grad = pipCtx.createLinearGradient(0, 300, 300, 0);
  grad.addColorStop(0, theme.start[0]);
  grad.addColorStop(0.5, theme.start[1]);
  grad.addColorStop(1, theme.start[2]);
  
  pipCtx.strokeStyle = grad;
  pipCtx.lineWidth = 12;
  pipCtx.lineCap = 'round';
  pipCtx.beginPath();
  pipCtx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * Math.max(progress, 0.001)));
  pipCtx.stroke();
  
  // 4. 時間字樣
  pipCtx.fillStyle = '#ffffff';
  pipCtx.font = '200 48px sans-serif';
  pipCtx.textAlign = 'center';
  pipCtx.textBaseline = 'middle';
  pipCtx.fillText(formatTime(remaining), cx, cy - 8);
  
  // 5. 階段標籤
  pipCtx.fillStyle = 'rgba(255, 255, 255, 0.55)';
  pipCtx.font = '500 15px sans-serif';
  pipCtx.fillText(phaseLabel.textContent, cx, cy + 34);
}

async function startPiP() {
  if ('pictureInPictureEnabled' in document) {
    try {
      if (!pipVideo) {
        pipVideo = document.createElement('video');
        pipVideo.muted = true;
        pipVideo.playsInline = true;
        
        // 捕獲 canvas 串流 (10 幀/秒)
        const stream = pipCanvas.captureStream(10);
        pipVideo.srcObject = stream;
        
        pipVideo.addEventListener('leavepictureinpicture', () => {
          pipActive = false;
          pipBtn.textContent = '開啟畫中畫懸浮時鐘';
        });
      }
      
      pipActive = true;
      updatePiPCanvas();
      await pipVideo.play();
      await pipVideo.requestPictureInPicture();
      pipBtn.textContent = '關閉畫中畫懸浮時鐘';
    } catch (err) {
      console.error('PiP error:', err);
      pipActive = false;
      alert('無法啟用畫中畫，請確認點擊時無阻擋或瀏覽器相容性');
    }
  } else {
    alert('此瀏覽器不支援 Picture-in-Picture 功能');
  }
}

async function togglePiP() {
  if (document.pictureInPictureElement) {
    await document.exitPictureInPicture();
    pipActive = false;
  } else {
    await startPiP();
  }
}
pipBtn.addEventListener('click', togglePiP);

const todoInput = document.getElementById('todoInput');
const todoAddBtn = document.getElementById('todoAddBtn');
const todoList = document.getElementById('todoList');

function getTodos() {
  try {
    return JSON.parse(localStorage.getItem('lf_todo') || '[]');
  } catch(e) {
    return [];
  }
}

function saveTodos(todos) {
  try {
    localStorage.setItem('lf_todo', JSON.stringify(todos));
  } catch(e){}
}

function renderTodos() {
  todoList.innerHTML = '';
  const todos = getTodos();
  todos.forEach(todo => {
    const li = document.createElement('li');
    li.className = 'todo-item';
    li.dataset.id = todo.id;
    
    li.innerHTML = `
      <div class="todo-checkbox ${todo.checked ? 'checked' : ''}"></div>
      <span class="todo-text ${todo.checked ? 'checked' : ''}">${todo.text}</span>
      <span class="todo-delete">&times;</span>
    `;
    
    // 點擊核取方塊觸發溶解動畫
    const cb = li.querySelector('.todo-checkbox');
    cb.addEventListener('click', () => {
      toggleTodo(todo.id, li);
    });
    
    // 刪除
    const del = li.querySelector('.todo-delete');
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteTodo(todo.id, li);
    });
    
    todoList.appendChild(li);
  });
}

function addTodo() {
  const text = todoInput.value.trim();
  if(!text) return;
  const todos = getTodos();
  todos.push({
    id: Date.now(),
    text,
    checked: false
  });
  saveTodos(todos);
  todoInput.value = '';
  renderTodos();
}

todoAddBtn.addEventListener('click', addTodo);
todoInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') addTodo();
});

function toggleTodo(id, liEl) {
  let todos = getTodos();
  const idx = todos.findIndex(t => t.id === id);
  if(idx === -1) return;
  
  const newChecked = !todos[idx].checked;
  todos[idx].checked = newChecked;
  saveTodos(todos);
  
  if (newChecked) {
    // 播放氣泡音效與溶解動畫
    const textEl = liEl.querySelector('.todo-text');
    textEl.classList.add('checked');
    liEl.querySelector('.todo-checkbox').classList.add('checked');
    
    // 獲取目前元素的位置
    const rect = liEl.getBoundingClientRect();
    const wrapper = todoList.getBoundingClientRect();
    
    // 將自定義動畫變數傳入 CSS
    liEl.style.setProperty('--start-bottom', (wrapper.bottom - rect.bottom) + 'px');
    liEl.style.setProperty('--drift-x', (Math.random() * 40 - 20) + 'px');
    liEl.style.setProperty('--drift-x-end', (Math.random() * 60 - 30) + 'px');
    
    liEl.classList.add('dissolving');
    
    // 播放完成音效
    playTone(500 + Math.random()*300, 0.4, 0.04, 'sine', 0, 0.4);
    
    setTimeout(() => {
      // 獲取最新的 todos 並排除此項
      const currentTodos = getTodos();
      const updatedTodos = currentTodos.filter(t => t.id !== id);
      saveTodos(updatedTodos);
      liEl.remove();
    }, 1900);
  } else {
    const textEl = liEl.querySelector('.todo-text');
    textEl.classList.remove('checked');
    liEl.querySelector('.todo-checkbox').classList.remove('checked');
  }
}

function deleteTodo(id, liEl) {
  liEl.style.opacity = '0';
  liEl.style.transform = 'scale(0.8)';
  setTimeout(() => {
    const todos = getTodos().filter(t => t.id !== id);
    saveTodos(todos);
    liEl.remove();
  }, 250);
}

// 首次渲染待辦事項
renderTodos();

// ===== 系統開關監聽 =====
const soundToggleCheck = document.getElementById('soundToggleCheck');
soundToggleCheck.addEventListener('change', () => {
  soundOn = soundToggleCheck.checked;
  if(soundOn) ensureAudio();
});

const drawerAmbientVol = document.getElementById('drawerAmbientVol');
drawerAmbientVol.addEventListener('input', () => {
  ambientVolume = drawerAmbientVol.value / 100;
  if(ambientGain && ambientType !== 'off'){
    ambientGain.gain.setTargetAtTime(ambientTarget(ambientType), audioCtx.currentTime, 0.05);
  }
  saveSettings();
});

document.querySelectorAll('.ambient-opt-item').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.ambient-opt-item').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    setAmbient(opt.dataset.noise);
  });
});

// ===== 氣泡手動戳擊效果 =====
function createPopParticles(x, y) {
  const count = 6;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'pop-particle';
    const size = 3 + Math.random() * 5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    
    // 隨機發射角度與距離
    const angle = Math.random() * Math.PI * 2;
    const distance = 20 + Math.random() * 30;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;
    
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 500);
  }
}

function triggerBubblePop(b) {
  const rect = b.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;
  
  playPopSound();
  createPopParticles(x, y);
  b.remove();
}

// ===== 系統定時器核心 =====
const timeDisplay = document.getElementById('timeDisplay');
const phaseLabel = document.getElementById('phaseLabel');
const percentTag = document.getElementById('percentTag');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const wavePath = document.getElementById('wavePath');
const bubbleLayer = document.getElementById('bubbleLayer');
const tabs = document.querySelectorAll('.mode-tabs span');
const stop1 = document.getElementById('stop1');
const stop2 = document.getElementById('stop2');
const stop3 = document.getElementById('stop3');

function formatTime(s){
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

// 顏色過渡
function lerpColor(a, b, t){
  const ah = parseInt(a.slice(1),16), bh = parseInt(b.slice(1),16);
  const ar = (ah>>16)&255, ag=(ah>>8)&255, ab=ah&255;
  const br = (bh>>16)&255, bg=(bh>>8)&255, bb=bh&255;
  const rr = Math.round(ar+(br-ar)*t), rg=Math.round(ag+(bg-ag)*t), rb=Math.round(ab+(bb-ab)*t);
  return '#'+[rr,rg,rb].map(x=>x.toString(16).padStart(2,'0')).join('');
}

// 繪製波浪
function drawWave(){
  const progress = 1 - (remaining/totalSeconds);
  const liquidHeightPct = Math.max(progress, 0.015);
  const baseY = 1000 * (1 - liquidHeightPct);
  const baseAmp = running ? 9 : 2.5;

  // 根據陀螺儀角度與基礎波浪疊加
  const points = [];
  for(let x=0; x<=1000; x+=20){
    const xN = (x - 500) / 500; // -1 ~ 1
     // 計算重力擺幅 (加大 PC/行動端 視覺效果)
     const tiltOffset = xN * Math.sin(tiltAngle) * 450;
    
    const y = baseY + tiltOffset
      + Math.sin((x/420)*2*Math.PI + waveOffset) * baseAmp
      + Math.sin((x/180)*2*Math.PI - waveOffset*1.4 + slowDrift) * baseAmp*0.35;
    points.push([x, y]);
  }

  let d = `M0,${points[0][1].toFixed(1)}`;
  for(let i=0; i<points.length-1; i++){
    const p0 = points[Math.max(i-1,0)];
    const p1 = points[i];
    const p2 = points[i+1];
    const p3 = points[Math.min(i+2, points.length-1)];
    const cp1x = p1[0] + (p2[0]-p0[0])/6;
    const cp1y = p1[1] + (p2[1]-p0[1])/6;
    const cp2x = p2[0] - (p3[0]-p1[0])/6;
    const cp2y = p2[1] - (p3[1]-p1[1])/6;
    d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0]},${p2[1].toFixed(1)}`;
  }
  d += ` L1000,1000 L0,1000 Z`;
  wavePath.setAttribute('d', d);

  // 套用主題漸層
  const theme = THEMES[currentTheme];
  stop1.setAttribute('stop-color', lerpColor(theme.start[0], theme.end[0], progress));
  stop2.setAttribute('stop-color', lerpColor(theme.start[1], theme.end[1], progress));
  stop3.setAttribute('stop-color', lerpColor(theme.start[2], theme.end[2], progress));

  percentTag.textContent = Math.round(progress*100)+'%';
}

function spawnBubble(){
  if(!running) return;
  const b = document.createElement('div');
  const size = 6 + Math.random()*15;
  b.className = 'bubble';
  b.style.width = size+'px';
  b.style.height = size+'px';
  b.style.left = (Math.random()*window.innerWidth)+'px';
  b.style.setProperty('--drift', (Math.random()*60-30)+'px');
  b.style.animationDuration = (4+Math.random()*3)+'s';
  
  // 綁定手動戳氣泡事件 (pointerdown 比 click 更加靈敏)
  b.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    triggerBubblePop(b);
  });
  
  bubbleLayer.appendChild(b);
  setTimeout(()=> { if (b.parentNode) b.remove(); }, 8000);
}
setInterval(spawnBubble, 350);

// 核心渲染迴圈
function tick(){
  waveOffset += running ? 0.045 : 0.012;
  slowDrift += 0.006;
  
  // 平滑插值更新液體傾斜角度 (支援陀螺儀與 PC 滑鼠移動)
  tiltAngle += (targetTiltAngle - tiltAngle) * 0.08;
  
  drawWave();
  
  // 更新 PiP 時鐘
  if (pipActive) {
    updatePiPCanvas();
  }
  
  requestAnimationFrame(tick);
}
tick();

// 定期播放氣泡水滴音效
setInterval(() => {
  if (running) playAmbientBubbleSound();
}, 2500);

function startTimer(){
  if(running) return;
  running = true;
  startBtn.textContent = '暫停';
  timerId = setInterval(()=>{
    remaining--;
    timeDisplay.textContent = formatTime(remaining);
    updateTitle();
    if(remaining<=0){
      clearInterval(timerId);
      running = false;
      celebrate();
    }
  }, 1000);
}

function pauseTimer(){
  running = false;
  clearInterval(timerId);
  startBtn.textContent = '繼續';
  updateTitle();
}

startBtn.addEventListener('click', ()=>{
  requestNotify();
  if(running) { pauseTimer(); playPauseSound(); }
  else { startBtn.textContent='暫停'; startTimer(); playStartSound(); updateTitle(); }
});

resetBtn.addEventListener('click', ()=>{
  clearInterval(timerId);
  running = false;
  remaining = totalSeconds;
  timeDisplay.textContent = formatTime(remaining);
  startBtn.textContent = '開始專注';
  updateTitle();
});

const customTime = document.getElementById('customTime');
const customInput = document.getElementById('customInput');
const customApply = document.getElementById('customApply');
const customTab = document.getElementById('customTab');
const autoLoopChk = document.getElementById('autoLoop');
const tomatoCountEl = document.getElementById('tomatoCount');

let isFocusPhase = true;   
let focusMin = 25;         
let pomodoroCount = 0;     
const PAGE_TITLE = 'Liquid Focus — 液態番茄鐘';

function updateTitle(){
  document.title = running
    ? formatTime(remaining) + (isFocusPhase ? ' · 專注中' : ' · 休息中')
    : PAGE_TITLE;
}

function applyMinutes(min, label, focus){
  totalSeconds = min*60;
  remaining = totalSeconds;
  isFocusPhase = focus;
  timeDisplay.textContent = formatTime(remaining);
  phaseLabel.textContent = label;
  clearInterval(timerId);
  running = false;
  startBtn.textContent = '開始專注';
  updateTitle();
  saveSettings();
}

tabs.forEach(tab=>{
  tab.addEventListener('click', ()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');

    if(tab.dataset.min === 'custom'){
      customTime.classList.add('show');   
      customInput.focus();
      return;
    }
    customTime.classList.remove('show');
    const min = parseInt(tab.dataset.min);
    const focus = (min === 25);
    if(focus) focusMin = min;
    applyMinutes(min, focus ? '專注時間' : '休息時間', focus);
  });
});

function commitCustom(){
  let min = parseInt(customInput.value);
  if(isNaN(min) || min < 1) min = 1;
  if(min > 180) min = 180;
  customInput.value = min;
  focusMin = min;
  applyMinutes(min, '專注時間', true);
  customTime.classList.remove('show');
}
customApply.addEventListener('click', commitCustom);
customInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') commitCustom(); });

autoLoopChk.addEventListener('change', saveSettings);

function refreshTomato(){ tomatoCountEl.textContent = '🍅 × ' + pomodoroCount; }

// ===== 系統推播通知 =====
function requestNotify(){
  if('Notification' in window && Notification.permission === 'default'){
    Notification.requestPermission();
  }
}
function notify(body){
  if('Notification' in window && Notification.permission === 'granted'){
    try { new Notification('Liquid Focus', { body, silent:true }); } catch(e){}
  }
}
function flashTitle(msg){
  let on = true, n = 0;
  const id = setInterval(()=>{
    document.title = on ? msg : PAGE_TITLE; on = !on; n++;
    if(n > 10){ clearInterval(id); updateTitle(); }
  }, 600);
}

function celebrate(){
  startBtn.textContent = '開始專注';
  playCompleteSound();
  let count = 0;
  const burst = setInterval(()=>{
    spawnBubble(); spawnBubble(); spawnBubble();
    count++;
    if(count>25) clearInterval(burst);
  }, 60);

  const finishedFocus = isFocusPhase;
  if(finishedFocus){ pomodoroCount++; refreshTomato(); }
  phaseLabel.textContent = finishedFocus ? '完成！' : '休息結束';
  notify(finishedFocus ? '專注完成，休息一下 🍵' : '休息結束，繼續加油 💪');
  flashTitle('⏰ 時間到！');
  saveSettings();

  if(autoLoopChk.checked){
    let nextMin, nextLabel, nextFocus;
    if(finishedFocus){
      nextFocus = false;
      const isLong = pomodoroCount % 4 === 0;   
      nextMin = isLong ? 15 : 5;
      nextLabel = isLong ? '長休息' : '短休息';
    } else {
      nextFocus = true; nextMin = focusMin; nextLabel = '專注時間';
    }
    applyMinutes(nextMin, nextLabel, nextFocus);
    setTimeout(()=>{ startBtn.textContent = '暫停'; startTimer(); updateTitle(); }, 1500);
  }
}

// ===== 設定保存與讀取 (localStorage) =====
let isLoadingSettings = false;
function saveSettings(){
  if (isLoadingSettings) return;
  try {
    localStorage.setItem('lf_settings', JSON.stringify({
      focusMin,
      autoLoop: autoLoopChk.checked,
      ambientVolume,
      pomodoroCount,
      countDate: new Date().toDateString(),
      currentTheme,
      ambientType,
      soundOn,
      bubbleSoundOn: bubbleSoundCheck.checked
    }));
  } catch(e){}
}

function loadSettings(){
  isLoadingSettings = true;
  try {
    const s = JSON.parse(localStorage.getItem('lf_settings') || '{}');
    
    // 恢復音量
    if(typeof s.ambientVolume === 'number'){
      ambientVolume = s.ambientVolume;
      drawerAmbientVol.value = Math.round(ambientVolume*100);
    }
    
    // 恢復循環與計數
    if(s.autoLoop) autoLoopChk.checked = true;
    if(s.pomodoroCount && s.countDate === new Date().toDateString()){
      pomodoroCount = s.pomodoroCount;
    }
    refreshTomato();
    
    // 恢復時長
    if(s.focusMin && s.focusMin !== 25){
      focusMin = s.focusMin;
      customInput.value = focusMin;
      tabs.forEach(t=>t.classList.remove('active'));
      customTab.classList.add('active');
      applyMinutes(focusMin, '專注時間', true);
    }

    // 恢復音效開關
    if(s.soundOn === false){
      soundOn = false;
      soundToggleCheck.checked = false;
    }
    if(s.bubbleSoundOn === false){
      bubbleSoundCheck.checked = false;
    }

    // 恢復視覺主題 (包含 default，以正確初始化 CSS 變數)
    if(s.currentTheme){
      document.querySelectorAll('.theme-opt').forEach(o => {
        if(o.dataset.theme === s.currentTheme) {
          o.classList.add('active');
        } else {
          o.classList.remove('active');
        }
      });
      setTheme(s.currentTheme);
    }

    // 恢復背景噪音類型
    if(s.ambientType && s.ambientType !== 'off'){
      document.querySelectorAll('.ambient-opt-item').forEach(o => {
        if(o.dataset.noise === s.ambientType) {
          o.classList.add('active');
        } else {
          o.classList.remove('active');
        }
      });
    }
  } catch(e){}
  isLoadingSettings = false;
}
loadSettings();
</script>
